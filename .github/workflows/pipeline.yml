name: TechFlow_Project CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  # -------------------------
  # Job 1: Run unit tests
  # -------------------------
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

  # -------------------------
  # Job 2: Build & push Docker image
  # -------------------------
  build-and-push:
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/techflow_app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/techflow_app:${{ github.sha }}

  # -------------------------
  #  Job 3 & 4: Deploy to EC2 with Health Check + Rollback
  # -------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Connect to server and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ec2-user
            chmod +x deploy.sh
            chmod +x health_check.sh
            chmod +x rollback.sh
            ./deploy.sh
  # -------------------------
  # Job 5: INTEGRATE EMAIL NOTIFICATIONS FOR PIPELINE STATUS
  # -------------------------

      - name: Send email on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ TechFlow Deployment Successful"
          to: "jackiekairuthi@gmail.com"
          from: "TechFlow CI/CD <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            Hello,

            The latest deployment of TechFlow Project completed successfully.

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Regards,
            Your CI/CD Pipeline

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ TechFlow Deployment FAILED"
          to: "jackiekairuthi@gmail.com"
          from: "TechFlow CI/CD <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            Hello,

            The latest deployment of TechFlow Project has FAILED.

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Please check the GitHub Actions logs for details.

            Regards,
            Your CI/CD Pipeline
